<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/onboarding/measurements"></ion-back-button>
    </ion-buttons>
    <ion-title>All Set!</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="complete-content">
    <ion-icon name="checkmark-circle-outline" size="large" color="success"></ion-icon>
    <h2>You're All Set!</h2>
    <p>Here's a summary of your kitchen profile:</p>

    <div class="summary-section">
      <ion-label class="section-label">Your Equipment</ion-label>
      <div class="equipment-list">
        <app-equipment-badge
          *ngFor="let id of onboardingState.selectedEquipment()"
          [equipmentId]="id">
        </app-equipment-badge>
      </div>
    </div>

    <div class="summary-section">
      <ion-label class="section-label">Preferences</ion-label>
      <ion-list>
        <ion-item lines="none">
          <ion-icon name="scale-outline" slot="start"></ion-icon>
          <ion-label>{{ measurementLabel }}</ion-label>
        </ion-item>
        <ion-item lines="none">
          <ion-icon name="thermometer-outline" slot="start"></ion-icon>
          <ion-label>{{ temperatureLabel }}</ion-label>
        </ion-item>
      </ion-list>
    </div>

    <ion-button expand="block" (click)="onGetStarted()" [disabled]="isLoading" class="ion-margin-top">
      {{ isLoading ? 'Setting up...' : 'Get Started' }}
      <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>
    </ion-button>
  </div>
</ion-content>
