<div class="step-content ion-padding">

  <div class="section-header">
    <p class="step-heading">Directions</p>
    <span class="step-count" *ngIf="stepsArray.length > 0" aria-live="polite">
      {{ stepsArray.length }} {{ stepsArray.length === 1 ? 'step' : 'steps' }}
    </span>
  </div>

  <!-- Empty state -->
  <div *ngIf="stepsArray.length === 0" class="empty-hint">
    <span class="empty-hint-icon" aria-hidden="true">👨‍🍳</span>
    <p>Break your recipe into clear steps</p>
  </div>

  <ion-reorder-group [disabled]="false" (ionItemReorder)="onReorder($event)">
    <ion-item-sliding *ngFor="let ctrl of stepsArray.controls; let i = index">
      <ion-item [formGroup]="getGroup(i)" lines="full" class="step-item">
        <ion-reorder slot="start" aria-label="Reorder step"></ion-reorder>
        <div class="step-body">
          <div class="step-number-row">
            <span class="step-badge" aria-label="Step {{ i + 1 }}">{{ i + 1 }}</span>
            <button
              class="expand-btn"
              (click)="toggleExpanded(i)"
              type="button"
              [attr.aria-expanded]="isExpanded(i)"
              [attr.aria-label]="isExpanded(i) ? 'Hide optional details' : 'Add temperature, duration, equipment'">
              <svg *ngIf="!isExpanded(i)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15" aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              <svg *ngIf="isExpanded(i)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15" aria-hidden="true">
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              <span>{{ isExpanded(i) ? 'Less' : 'Details' }}</span>
            </button>
          </div>

          <ion-textarea
            formControlName="instruction"
            placeholder="Describe this step clearly…"
            rows="2"
            auto-grow="true"
            aria-label="Step {{ i + 1 }} instruction">
          </ion-textarea>

          <!-- Optional fields panel -->
          <div class="optional-fields" *ngIf="isExpanded(i)">
            <ion-item lines="none">
              <ion-label position="stacked">Temperature (°C)</ion-label>
              <ion-input formControlName="temperature" type="number" inputmode="numeric" placeholder="e.g. 180"></ion-input>
            </ion-item>
            <ion-item lines="none">
              <ion-label position="stacked">Duration (minutes)</ion-label>
              <ion-input formControlName="duration" type="number" inputmode="numeric" placeholder="e.g. 25"></ion-input>
            </ion-item>
            <ion-item lines="none">
              <ion-label position="stacked">Equipment</ion-label>
              <ion-select formControlName="equipment" placeholder="Optional">
                <ion-select-option value="">None</ion-select-option>
                <ion-select-option *ngFor="let eq of equipmentTypes" [value]="eq.id">{{ eq.label }}</ion-select-option>
              </ion-select>
            </ion-item>
            <ion-item lines="none">
              <ion-label position="stacked">Technique note</ion-label>
              <ion-input formControlName="technique" placeholder="e.g. sear on high heat first"></ion-input>
            </ion-item>
          </div>
        </div>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="removeStep(i)" [attr.aria-label]="'Remove step ' + (i + 1)">
          <ion-icon slot="icon-only" name="trash-outline" aria-hidden="true"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-reorder-group>

  <p class="swipe-hint" *ngIf="stepsArray.length > 0" aria-hidden="true">
    Swipe left to delete · Drag to reorder
  </p>

  <button class="add-row-btn" (click)="addStep()" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16" aria-hidden="true">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Add step
  </button>

</div>
