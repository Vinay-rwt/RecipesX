<div class="step-content ion-padding" [formGroup]="form">

  <h3>Source Equipment</h3>
  <p class="step-hint">Which appliance does this recipe use?</p>

  <ion-grid>
    <ion-row>
      <ion-col size="6" size-md="3" *ngFor="let item of equipmentTypes">
        <ion-card
          [class.selected]="isSelected(item.id)"
          (click)="selectEquipment(item.id)"
          button>
          <ion-card-content class="equipment-card">
            <ion-icon [name]="item.icon" size="large"></ion-icon>
            <ion-label>{{ item.label }}</ion-label>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-note color="danger" *ngIf="form.get('sourceEquipment')?.invalid && form.get('sourceEquipment')?.touched" class="ion-padding-start">
    Please select your source equipment
  </ion-note>

  <h3 class="ion-margin-top">Servings & Timing</h3>

  <ion-item>
    <ion-label position="stacked">Base Servings <ion-text color="danger">*</ion-text></ion-label>
    <ion-input formControlName="baseServings" type="number" min="1" max="100"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Prep Time (minutes)</ion-label>
    <ion-input formControlName="prepTime" type="number" min="0"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Cook Time (minutes)</ion-label>
    <ion-input formControlName="cookTime" type="number" min="0"></ion-input>
  </ion-item>

</div>
