<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Feed</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="showFilters = !showFilters">
        <ion-icon slot="icon-only" name="filter-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <ion-toolbar>
    <ion-searchbar
      [(ngModel)]="searchQuery"
      (ionInput)="onSearch()"
      [debounce]="400"
      placeholder="Search recipes...">
    </ion-searchbar>
  </ion-toolbar>

  <ion-toolbar *ngIf="showFilters" class="filter-toolbar">
    <div class="filter-row">
      <ion-select
        placeholder="Cuisine"
        [(ngModel)]="selectedCuisine"
        (ionChange)="onCuisineChange(selectedCuisine)"
        interface="popover"
        class="filter-select">
        <ion-select-option value="">All cuisines</ion-select-option>
        <ion-select-option *ngFor="let c of cuisineTypes" [value]="c">{{ c }}</ion-select-option>
      </ion-select>

      <ion-select
        placeholder="Difficulty"
        [(ngModel)]="selectedDifficulty"
        (ionChange)="onDifficultyChange(selectedDifficulty)"
        interface="popover"
        class="filter-select">
        <ion-select-option value="">All levels</ion-select-option>
        <ion-select-option *ngFor="let d of difficulties" [value]="d">{{ d | titlecase }}</ion-select-option>
      </ion-select>

      <ion-button fill="clear" size="small" (click)="clearFilters()">Clear</ion-button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="onRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <!-- Loading skeleton -->
  <div *ngIf="feedService.loading() && feedService.recipes().length === 0" class="feed-list">
    <ion-card *ngFor="let i of [1,2,3]" class="skeleton-card">
      <ion-skeleton-text animated style="height: 160px;"></ion-skeleton-text>
      <ion-card-header>
        <ion-skeleton-text animated style="height: 1rem; width: 70%;"></ion-skeleton-text>
        <ion-skeleton-text animated style="height: 0.8rem; width: 40%;"></ion-skeleton-text>
      </ion-card-header>
    </ion-card>
  </div>

  <!-- Empty state -->
  <div *ngIf="!feedService.loading() && feedService.recipes().length === 0" class="empty-state">
    <ion-icon name="restaurant-outline"></ion-icon>
    <h3>No recipes found</h3>
    <p>Try adjusting your filters or be the first to share a recipe!</p>
    <ion-button fill="clear" (click)="clearFilters()">Clear filters</ion-button>
  </div>

  <!-- Recipe feed -->
  <div class="feed-list" *ngIf="feedService.recipes().length > 0">
    <app-recipe-card
      *ngFor="let recipe of feedService.recipes()"
      [recipe]="recipe"
      [showSocialActions]="true"
      [isLiked]="likedRecipes().has(recipe.id!)"
      [isSaved]="savedRecipes().has(recipe.id!)"
      (likeToggled)="onToggleLike(recipe.id!)"
      (saveToggled)="onToggleSave(recipe.id!)"
      (shareClicked)="onShare(recipe)">
    </app-recipe-card>
  </div>

  <ion-infinite-scroll (ionInfinite)="loadMore($event)" [disabled]="!feedService.hasMore()">
    <ion-infinite-scroll-content loadingText="Loading more recipes..."></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
