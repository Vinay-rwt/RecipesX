<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/feed"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ profile()?.displayName ?? '' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <!-- Loading skeleton -->
  <div *ngIf="loading()">
    <div class="profile-hero">
      <ion-skeleton-text animated style="width: 84px; height: 84px; border-radius: 50%; margin: 0 auto 12px;"></ion-skeleton-text>
      <ion-skeleton-text animated style="width: 40%; height: 1.2rem; margin: 0 auto 8px;"></ion-skeleton-text>
      <ion-skeleton-text animated style="width: 60%; height: 0.85rem; margin: 0 auto;"></ion-skeleton-text>
    </div>
    <ion-skeleton-text animated style="width: 100%; height: 40px; border-radius: 8px; margin: 16px 0;"></ion-skeleton-text>
    <ion-skeleton-text animated style="width: 100%; height: 80px; border-radius: 8px;"></ion-skeleton-text>
  </div>

  <!-- Content -->
  <div *ngIf="!loading() && profile() as p">

    <!-- Profile hero -->
    <div class="profile-hero">

      <!-- Avatar -->
      <div class="avatar-wrap">
        <img *ngIf="p.photoURL" [src]="p.photoURL" [alt]="p.displayName" class="profile-avatar" />
        <div *ngIf="!p.photoURL" class="profile-avatar avatar-placeholder" aria-hidden="true">
          {{ (p.displayName || '?')[0].toUpperCase() }}
        </div>
      </div>

      <h2 class="profile-name">{{ p.displayName }}</h2>

      <div class="profile-level" *ngIf="p.cookingLevel">
        {{ cookingLevelLabel(p.cookingLevel) }}
      </div>

      <p class="profile-bio" *ngIf="p.bio">{{ p.bio }}</p>

      <div class="profile-meta">
        <span *ngIf="p.location" class="meta-item">
          <ion-icon name="location-outline" aria-hidden="true"></ion-icon>
          {{ p.location }}
        </span>
        <a *ngIf="p.websiteUrl" [href]="p.websiteUrl" target="_blank" rel="noopener noreferrer" class="meta-item meta-link">
          <ion-icon name="link-outline" aria-hidden="true"></ion-icon>
          {{ p.websiteUrl | urlDisplay }}
        </a>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <button class="stat" [routerLink]="['/tabs/feed/user', p.uid, 'followers']" aria-label="View followers list">
          <span class="stat-value">{{ p.followersCount ?? 0 }}</span>
          <span class="stat-label">Followers</span>
        </button>
        <button class="stat" [routerLink]="['/tabs/feed/user', p.uid, 'following']" aria-label="View following list">
          <span class="stat-value">{{ p.followingCount ?? 0 }}</span>
          <span class="stat-label">Following</span>
        </button>
        <button class="stat" type="button" style="cursor: default;" aria-label="Recipe count">
          <span class="stat-value">{{ recipes().length }}</span>
          <span class="stat-label">Recipes</span>
        </button>
      </div>

      <!-- Follow / Unfollow -->
      <ion-button
        *ngIf="!isOwnProfile()"
        [fill]="isFollowing() ? 'outline' : 'solid'"
        class="follow-btn"
        (click)="onToggleFollow()"
        [attr.aria-label]="isFollowing() ? 'Unfollow ' + p.displayName : 'Follow ' + p.displayName">
        {{ isFollowing() ? 'Following' : 'Follow' }}
      </ion-button>
    </div>

    <!-- Recipes -->
    <h3 class="section-title" *ngIf="recipes().length > 0">Recipes</h3>

    <app-recipe-card
      *ngFor="let recipe of recipes()"
      [recipe]="recipe"
      [showSocialActions]="false"
      [showAuthor]="false">
    </app-recipe-card>

    <!-- Empty state -->
    <div *ngIf="recipes().length === 0" class="empty-state ion-text-center ion-padding">
      <ion-icon name="restaurant-outline" color="medium" style="font-size: 3rem;" aria-hidden="true"></ion-icon>
      <p>No recipes yet.</p>
    </div>

  </div>

  <!-- User not found -->
  <div *ngIf="!loading() && !profile()" class="empty-state ion-text-center ion-padding">
    <ion-icon name="person-outline" color="medium" style="font-size: 3rem;" aria-hidden="true"></ion-icon>
    <p>User not found.</p>
  </div>

</ion-content>
