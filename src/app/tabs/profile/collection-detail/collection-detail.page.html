<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/profile/collections"></ion-back-button>
    </ion-buttons>
    <ion-title>
      <span *ngIf="collection() as col">{{ col.emoji }} {{ col.name }}</span>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <!-- Loading -->
  <div *ngIf="loading()" class="ion-padding">
    <div *ngFor="let s of [1,2,3]" class="skeleton-card">
      <ion-skeleton-text animated style="width: 100%; height: 200px; border-radius: 12px; margin-bottom: 12px;"></ion-skeleton-text>
    </div>
  </div>

  <!-- Empty collection -->
  <div
    *ngIf="!loading() && recipes().length === 0"
    class="empty-state ion-text-center ion-padding">
    <div class="empty-icon">{{ collection()?.emoji || '📚' }}</div>
    <h3>No recipes yet</h3>
    <p>Save recipes from the feed and add them to this collection.</p>
  </div>

  <!-- Recipe list -->
  <div *ngIf="!loading() && recipes().length > 0" class="recipe-list ion-padding">
    <ion-item-sliding *ngFor="let recipe of recipes()" class="recipe-slide">

      <ion-item lines="none" class="recipe-item" [routerLink]="['/recipe', recipe.id]">
        <div class="recipe-thumb" slot="start">
          <img
            *ngIf="recipe.photoURLs?.length"
            [src]="recipe.photoURLs[0]"
            [alt]="recipe.title">
          <div *ngIf="!recipe.photoURLs?.length" class="thumb-emoji">
            {{ recipe.coverEmoji || '🍽️' }}
          </div>
        </div>
        <ion-label>
          <h3>{{ recipe.title }}</h3>
          <p>{{ recipe.cuisineType }} · {{ recipe.cookTime }}m</p>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="onRemoveRecipe(recipe)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>

    </ion-item-sliding>
  </div>

</ion-content>
