<div class="my-recipes-container">
  <!-- Loading skeleton -->
  <div *ngIf="loading" class="recipe-scroll">
    <ion-skeleton-text *ngFor="let i of [1,2,3]" animated style="width:180px;height:200px;border-radius:12px;flex-shrink:0"></ion-skeleton-text>
  </div>

  <!-- Recipe cards -->
  <div *ngIf="!loading && recipes.length > 0" class="recipe-scroll">
    <div *ngFor="let recipe of recipes" class="recipe-card-wrap">
      <app-recipe-card [recipe]="recipe"></app-recipe-card>
      <button
        class="recipe-edit-btn"
        (click)="navigateToEdit(recipe.id!, $event)"
        [attr.aria-label]="'Edit ' + recipe.title"
        type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14" aria-hidden="true">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading && recipes.length === 0" class="empty-state">
    <ion-icon name="book-outline"></ion-icon>
    <p>No recipes yet</p>
    <ion-button size="small" fill="outline" routerLink="/tabs/create">Create your first recipe</ion-button>
  </div>
</div>
