<ion-grid>
  <ion-row>
    <ion-col size="6" size-md="3" *ngFor="let item of equipmentTypes">
      <ion-card
        [class.selected]="isSelected(item.id)"
        (click)="toggleEquipment(item.id)"
        button>
        <ion-card-content class="equipment-card">
          <ion-icon [name]="item.icon" size="large"></ion-icon>
          <ion-label>{{ item.label }}</ion-label>
        </ion-card-content>
      </ion-card>
    </ion-col>
  </ion-row>
</ion-grid>
