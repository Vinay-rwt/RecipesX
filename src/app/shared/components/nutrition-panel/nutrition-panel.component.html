<div class="nutrition-panel">

  <!-- Header (always visible, tappable) -->
  <button class="panel-header" (click)="toggle()" [attr.aria-expanded]="isOpen()">
    <ion-icon name="nutrition-outline" aria-hidden="true"></ion-icon>
    <span>Nutrition <span class="per-serving">(per serving)</span></span>
    <ion-icon
      name="chevron-down-outline"
      class="chevron"
      [class.open]="isOpen()"
      aria-hidden="true">
    </ion-icon>
  </button>

  <!-- Collapsible body -->
  <div class="panel-body" [class.open]="isOpen()">

    <!-- Loading -->
    <ng-container *ngIf="nutritionState().status === 'loading'">
      <div class="skeleton-row" *ngFor="let i of [1,2,3]">
        <ion-skeleton-text animated style="width: 40%; height: 0.85rem;"></ion-skeleton-text>
        <ion-skeleton-text animated style="width: 20%; height: 0.85rem;"></ion-skeleton-text>
      </div>
    </ng-container>

    <!-- Error -->
    <div class="error-row" *ngIf="nutritionState().status === 'error'">
      <ion-icon name="warning-outline" color="warning" aria-hidden="true"></ion-icon>
      <span>{{ $any(nutritionState()).message }} Tap to retry.</span>
    </div>

    <!-- Success -->
    <ng-container *ngIf="nutritionState().status === 'success' && scaledMacros() as m">

      <div class="macro-row">
        <span class="macro-label">Calories</span>
        <span class="macro-value">{{ m.calories }} kcal</span>
      </div>
      <div class="macro-bar-track">
        <div class="macro-bar-fill calories" [style.width.%]="barWidth(m.calories, 'calories')"></div>
      </div>

      <div class="macro-row">
        <span class="macro-label">Protein</span>
        <span class="macro-value">{{ m.protein }} g</span>
      </div>
      <div class="macro-bar-track">
        <div class="macro-bar-fill protein" [style.width.%]="barWidth(m.protein, 'protein')"></div>
      </div>

      <div class="macro-row">
        <span class="macro-label">Carbs</span>
        <span class="macro-value">{{ m.carbs }} g</span>
      </div>
      <div class="macro-bar-track">
        <div class="macro-bar-fill carbs" [style.width.%]="barWidth(m.carbs, 'carbs')"></div>
      </div>

      <div class="macro-row">
        <span class="macro-label">Fat</span>
        <span class="macro-value">{{ m.fat }} g</span>
      </div>
      <div class="macro-bar-track">
        <div class="macro-bar-fill fat" [style.width.%]="barWidth(m.fat, 'fat')"></div>
      </div>

      <div class="macro-row">
        <span class="macro-label">Fiber</span>
        <span class="macro-value">{{ m.fiber }} g</span>
      </div>
      <div class="macro-bar-track last">
        <div class="macro-bar-fill fiber" [style.width.%]="barWidth(m.fiber, 'fiber')"></div>
      </div>

      <p class="disclaimer" *ngIf="isIncomplete()">
        <ion-icon name="information-circle-outline" aria-hidden="true"></ion-icon>
        Estimate only — some ingredients could not be looked up.
      </p>

    </ng-container>

  </div>
</div>
